<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fa6831" />
    <title>Mentoring · WebExpo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --orange: #fa6831;
        --orange-dark: #d94c1c;
        --orange-darker: #b03e10;
        --orange-light: #ff8a55;
        --ink: #1a1a1a;
        --muted: #5b6166;
        --card: #ffffff;
        --card-hover: #fff7ef;
        --shadow: 0 8px 24px rgba(60, 20, 0, 0.18),
          0 2px 6px rgba(60, 20, 0, 0.08);
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--orange);
        color: var(--ink);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
      }

      /* Full-page hex pattern background */
      .bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 0 16px;
      }

      /* ---------- Top section with logo ---------- */
      .topbar {
        padding-top: calc(40px + var(--safe-top));
        display: flex;
        justify-content: center;
      }

      .logo {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: #0a0a0a;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 800;
        font-size: 32px;
        letter-spacing: 0.02em;
        box-shadow: 0 12px 32px rgba(60, 20, 0, 0.35);
      }

      .logo small {
        display: block;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: #b8bcc2;
        margin-top: 2px;
      }

      /* ---------- Hero copy ---------- */
      .hero {
        text-align: center;
        padding: 28px 8px 8px;
        color: #fff;
        text-shadow: 0 2px 12px rgba(60, 20, 0, 0.25);
      }

      .hero h1 {
        margin: 0 0 6px;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .hero p {
        margin: 0;
        font-size: 16px;
        opacity: 0.95;
      }

      /* ---------- Cards ---------- */
      .cards {
        padding: 28px 0 calc(40px + var(--safe-bottom));
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        display: grid;
        grid-template-columns: 64px 1fr 24px;
        align-items: center;
        gap: 12px;
        padding: 10px 16px 10px 10px;
        background: var(--card);
        border-radius: 999px;
        color: var(--ink);
        text-decoration: none;
        box-shadow: var(--shadow);
        transition: background 0.15s ease, transform 0.15s ease,
          box-shadow 0.15s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .card:hover {
        background: var(--card-hover);
      }

      .card:active {
        transform: scale(0.985);
        box-shadow: 0 4px 12px rgba(60, 20, 0, 0.18);
      }

      .icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #fff;
        overflow: hidden;
      }

      .icon svg {
        width: 32px;
        height: 32px;
        display: block;
      }

      .icon.linkedin {
        background: #0a66c2;
      }

      .icon.miro {
        background: #ffd02f;
      }

      .icon.uxr {
        background: #1f1f1f;
      }

      .icon.skills {
        background: #4f46e5;
      }

      .icon.prusa {
        background: var(--orange);
      }

      .icon.prusa svg {
        width: 46px;
        height: auto;
        display: block;
      }

      .label {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .label .title {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.25;
        color: var(--ink);
      }

      .label .sub {
        margin-top: 2px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.3;
      }

      .chev {
        color: #c8ccd2;
      }

      /* ---------- Footer ---------- */
      .foot {
        margin-top: auto;
        text-align: center;
        padding: 8px 24px calc(20px + var(--safe-bottom));
        color: rgba(255, 255, 255, 0.85);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-shadow: 0 1px 6px rgba(60, 20, 0, 0.2);
      }

      /* ---------- Session timer ---------- */
      .timer {
        background: #fff;
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 16px 18px 20px;
        margin-top: 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .timer-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }
      .timer-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #b1b6bd;
      }
      .clock {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 15px;
        font-weight: 700;
        color: #3a3f45;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      .clock svg {
        width: 15px;
        height: 15px;
        color: #b1b6bd;
      }
      .timer-ring {
        position: relative;
        width: 150px;
        height: 150px;
      }
      .timer-ring svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .timer-ring .track {
        fill: none;
        stroke: #f0ebe4;
        stroke-width: 9;
      }
      .timer-ring .prog {
        fill: none;
        stroke: var(--orange);
        stroke-width: 9;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.4s linear, stroke 0.3s ease;
      }
      .timer-time {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 38px;
        font-weight: 800;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
      }
      .timer.ending .prog,
      .timer.finished .prog {
        stroke: #e23b2e;
      }
      .timer.ending .timer-time,
      .timer.finished .timer-time {
        color: #e23b2e;
      }
      .timer.finished {
        animation: timerflash 0.8s ease 3;
      }
      @keyframes timerflash {
        50% {
          box-shadow: 0 0 0 4px rgba(226, 59, 46, 0.35), var(--shadow);
        }
      }
      .presets {
        display: flex;
        gap: 8px;
      }
      .presets button {
        border: 1px solid #e6e1da;
        background: #fff;
        color: var(--muted);
        font: inherit;
        font-weight: 600;
        font-size: 14px;
        padding: 6px 16px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease,
          color 0.15s ease;
      }
      .presets button.active {
        background: #fff3ec;
        border-color: var(--orange);
        color: var(--orange);
      }
      .timer-btns {
        display: flex;
        gap: 10px;
        width: 100%;
      }
      .timer-btns button {
        flex: 1;
        font: inherit;
        font-weight: 700;
        font-size: 15px;
        padding: 13px;
        border-radius: 999px;
        cursor: pointer;
        border: none;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.12s ease, filter 0.15s ease;
      }
      .timer-btns button:active {
        transform: scale(0.98);
      }
      .t-primary {
        background: var(--orange);
        color: #fff;
      }
      .t-secondary {
        background: #f1ece6;
        color: var(--ink);
      }

      /* ---------- QR panel ---------- */
      .qr-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        margin: 20px auto 4px;
        width: min(240px, 72%);
      }

      .qr-card {
        background: #fff;
        border-radius: 24px;
        padding: 14px;
        box-shadow: var(--shadow);
        line-height: 0;
      }

      .qr-card img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 10px;
      }

      .qr-caption {
        margin: 0;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.02em;
        text-shadow: 0 1px 6px rgba(60, 20, 0, 0.2);
      }

      @media (min-width: 1120px) {
        .qr-panel {
          position: fixed;
          top: 50%;
          right: max(28px, 4vw);
          transform: translateY(-50%);
          margin: 0;
          width: 240px;
          z-index: 2;
        }
      }
    </style>
  </head>

        <use href="#hex" x="-100" y="380" width="380" height="331" />
        <use href="#hex" x="500" y="440" width="440" height="383" />
        <use href="#hex" x="240" y="180" width="320" height="278" opacity="0.85" />

      <g fill="#b03e10" opacity="0.55">

    <script>
      (function () {
        var total = 20 * 60,
          remaining = total,
          running = false,
          ticker = null,
          actx = null;
        var prog = document.querySelector(".timer .prog");
        var timeEl = document.getElementById("time");
        var card = document.querySelector(".timer");
        var startPause = document.getElementById("startPause");
        var C = 2 * Math.PI * 52;
        prog.style.strokeDasharray = C;

        function fmt(s) {
          var m = Math.floor(s / 60),
            x = s % 60;
          return m + ":" + (x < 10 ? "0" : "") + x;
        }
        function paint() {
          timeEl.textContent = fmt(remaining);
          prog.style.strokeDashoffset = C * (1 - (total ? remaining / total : 0));
          card.classList.toggle("ending", remaining <= 60 && remaining > 0);
        }
        function tick() {
          remaining--;
          if (remaining <= 0) {
            remaining = 0;
            paint();
            pause();
            card.classList.add("finished");
            beep();
            return;
          }
          paint();
        }
        function start() {
          if (running || remaining <= 0) return;
          if (!actx) {
            try {
              actx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {}
          }
          if (actx && actx.state === "suspended") actx.resume();
          running = true;
          startPause.textContent = "Pause";
          ticker = setInterval(tick, 1000);
        }
        function pause() {
          running = false;
          startPause.textContent = "Start";
          clearInterval(ticker);
        }
        function reset() {
          pause();
          remaining = total;
          card.classList.remove("finished", "ending");
          paint();
        }
        function setMinutes(m) {
          pause();
          total = m * 60;
          remaining = total;
          card.classList.remove("finished", "ending");
          paint();
        }
        function beep() {
          if (!actx) return;
          [0, 0.35, 0.7].forEach(function (t) {
            var o = actx.createOscillator(),
              g = actx.createGain();
            o.type = "sine";
            o.frequency.value = 880;
            o.connect(g);
            g.connect(actx.destination);
            var s = actx.currentTime + t;
            g.gain.setValueAtTime(0.0001, s);
            g.gain.exponentialRampToValueAtTime(0.3, s + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, s + 0.25);
            o.start(s);
            o.stop(s + 0.27);
          });
        }
        startPause.addEventListener("click", function () {
          running ? pause() : start();
        });
        document.getElementById("resetTimer").addEventListener("click", reset);
        document.getElementById("presets").addEventListener("click", function (e) {
          if (e.target.tagName !== "BUTTON") return;
          [].forEach.call(this.children, function (b) {
            b.classList.remove("active");
          });
          e.target.classList.add("active");
          setMinutes(+e.target.dataset.min);
        });
        paint();
      })();

      (function () {
        var el = document.getElementById("clock");
        function upd() {
          var d = new Date();
          var h = d.getHours(),
            m = d.getMinutes();
          el.textContent = (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m;
        }
        upd();
        setInterval(upd, 1000);
      })();
    </script>
  </body>
</html>
